name: conduit
description: "Peer-to-peer folder sync between your PC and phone over your local network."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Crypto + identity
  crypto: ^3.0.5
  convert: ^3.1.2
  ed25519_edwards: ^0.3.1
  uuid: ^4.5.1

  # Storage / paths
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2

  # SQLite for the per-folder Index DB (REDESIGN.md Phase 1). sqflite_common_ffi
  # provides an FFI-based database factory that works on Windows desktop AND
  # Android; sqlite3_flutter_libs ships the native sqlite3 binary on Android
  # (and other mobile/desktop targets) so the FFI factory has a library to call.
  # Pinned to ^2.3.4+4 — the last line that supports Dart SDK 3.6.x. The 2.4.x
  # line requires SDK >=3.7.0, which is newer than this project's baseline.
  # `sqflite_common` (the platform-agnostic API surface) and `meta` (for the
  # @visibleForTesting annotation) are imported directly by lib code, so they
  # are listed explicitly rather than relied on as transitive deps.
  sqflite_common_ffi: ^2.3.4+4
  sqflite_common: ^2.5.4
  sqlite3_flutter_libs: ^0.5.24
  meta: ^1.15.0

  # Networking
  network_info_plus: ^6.1.1

  # QR code (generate on PC, scan on phone)
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # State management
  provider: ^6.1.2

  # Filesystem picking
  file_picker: ^8.1.3

  # UI niceties
  intl: ^0.19.0

  # Phase 1 (background survival): close-to-tray + system tray on Windows.
  window_manager: ^0.4.3
  tray_manager: ^0.4.0

  # Phase 3 (ad-hoc file send): system notifications on transfer completion.
  # Handles Android notification channels + Windows toast in one package.
  flutter_local_notifications: ^18.0.1

  # Fonts
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Pulled in transitively via flutter_test/test already (pinned in
  # pubspec.lock), but clipboard_sync_test.dart imports it directly to drive
  # ClipboardSync's poll Timer deterministically, so it's listed explicitly
  # per this project's convention (see sqflite_common/meta above).
  fake_async: ^1.3.1

flutter:
  uses-material-design: true

  assets:
    # Tray icon for the Windows close-to-tray integration (Roadmap Phase 1).
    - assets/icons/
