<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Conduit — Overview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg-deep: #0A0E17;
    --glow-indigo: #4F46E5;
    --glow-teal: #14B8A6;

    --glass-fill: rgba(255,255,255,0.055);
    --glass-fill-hover: rgba(255,255,255,0.09);
    --glass-border: rgba(255,255,255,0.12);
    --glass-border-strong: rgba(255,255,255,0.22);
    --glass-highlight: rgba(255,255,255,0.35);

    --accent-violet: #A78BFA;
    --accent-violet-glow: rgba(167,139,250,0.35);
    --accent-emerald: #34D399;
    --accent-emerald-glow: rgba(52,211,153,0.35);
    --accent-sky: #38BDF8;

    --text-primary: #F4F6FA;
    --text-secondary: #93A0B4;
    --text-tertiary: #5F6D82;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    background: var(--bg-deep);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    font-family:'Inter', sans-serif;
  }

  /* ---------- App window ---------- */
  .app-window{
    width:400px;
    height:820px;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    box-shadow:
      0 40px 90px -20px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,255,255,0.06);
    isolation:isolate;
  }

  /* ambient light sources — this is what makes translucency read as glass */
  .ambient{
    position:absolute;
    inset:0;
    z-index:0;
    background:
      radial-gradient(600px 500px at 15% -5%, rgba(79,70,229,0.35), transparent 60%),
      radial-gradient(500px 450px at 105% 35%, rgba(20,184,166,0.28), transparent 60%),
      radial-gradient(700px 600px at 30% 115%, rgba(56,189,248,0.14), transparent 60%),
      linear-gradient(180deg, #0D1220 0%, #0A0E17 45%, #090C14 100%);
  }
  .ambient::after{
    content:'';
    position:absolute; inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity:0.5;
  }

  /* ---------- Title bar ---------- */
  .titlebar{
    position:relative;
    z-index:2;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px 0 16px;
    background: rgba(6,9,16,0.55);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .titlebar-left{ display:flex; align-items:center; gap:8px; }
  .titlebar-logo{
    width:20px; height:20px; border-radius:6px;
    background: linear-gradient(135deg, var(--accent-violet), #7C6EF0);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 2px 8px rgba(167,139,250,0.4);
  }
  .titlebar-logo svg{ width:12px; height:12px; }
  .titlebar-title{ font-family:'Manrope',sans-serif; font-weight:700; font-size:13px; color: var(--text-primary); letter-spacing:0.2px; }
  .titlebar-controls{ display:flex; align-items:center; gap:16px; }
  .titlebar-controls span{ width:11px; height:11px; opacity:0.5; display:flex; align-items:center; justify-content:center; }
  .titlebar-controls svg{ width:100%; height:100%; stroke:var(--text-secondary); stroke-width:1.4; fill:none; }

  /* ---------- Scroll content ---------- */
  .content{
    position:relative;
    z-index:1;
    height:calc(820px - 44px);
    overflow-y:auto;
    padding:26px 20px 100px;
  }
  .content::-webkit-scrollbar{ width:0; }

  h1.page-title{
    font-family:'Manrope',sans-serif;
    font-weight:800;
    font-size:30px;
    color:var(--text-primary);
    letter-spacing:-0.5px;
    margin-bottom:22px;
  }

  .section-label{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:13px;
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:1px;
    margin: 26px 0 12px 2px;
  }
  .section-label:first-of-type{ margin-top:0; }

  /* ---------- Base glass tile ---------- */
  .glass{
    position:relative;
    background: var(--glass-fill);
    border:1px solid var(--glass-border);
    border-radius:18px;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow:
      0 1px 1px rgba(255,255,255,0.06) inset,
      0 12px 24px -12px rgba(0,0,0,0.55),
      0 2px 4px rgba(0,0,0,0.25);
    overflow:hidden;
    transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  /* the light-catch edge — thin bright line along the top, fading at the corners */
  .glass::before{
    content:'';
    position:absolute;
    top:0; left:8%; right:8%;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
    opacity:0.55;
  }
  .glass:hover{
    background: var(--glass-fill-hover);
    transform: translateY(-1px);
    box-shadow:
      0 1px 1px rgba(255,255,255,0.08) inset,
      0 16px 32px -14px rgba(0,0,0,0.6),
      0 2px 6px rgba(0,0,0,0.3);
  }

  /* ---------- Status hero ---------- */
  .hero{
    padding:20px;
    display:flex;
    align-items:center;
    gap:16px;
    border-color: rgba(52,211,153,0.22);
    background:
      linear-gradient(155deg, rgba(52,211,153,0.10), rgba(255,255,255,0.04) 55%);
  }
  /* the signature specular sweep — one real reflection, used once */
  .hero::after{
    content:'';
    position:absolute;
    top:-60%; left:-20%;
    width:70%; height:220%;
    background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.10) 48%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.10) 52%, transparent 60%);
    transform: rotate(0deg);
    pointer-events:none;
  }
  .hero-icon{
    width:46px; height:46px;
    border-radius:14px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 35% 30%, rgba(52,211,153,0.9), rgba(16,145,101,0.9));
    box-shadow: 0 4px 16px var(--accent-emerald-glow), 0 0 0 1px rgba(255,255,255,0.15) inset;
  }
  .hero-icon svg{ width:22px; height:22px; stroke:#0A0E17; stroke-width:3; fill:none; }
  .hero-text-title{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:16.5px;
    color:var(--text-primary);
    margin-bottom:3px;
  }
  .hero-text-sub{ font-size:13px; color:var(--text-secondary); }

  /* ---------- List tiles ---------- */
  .tile-list{ display:flex; flex-direction:column; gap:10px; }
  .tile{
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
  }
  .tile-icon{
    width:38px; height:38px;
    border-radius:11px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,0.10);
  }
  .tile-icon.violet{
    background: radial-gradient(circle at 35% 30%, rgba(167,139,250,0.32), rgba(124,110,240,0.18));
    box-shadow: 0 0 14px var(--accent-violet-glow);
  }
  .tile-icon.sky{
    background: radial-gradient(circle at 35% 30%, rgba(56,189,248,0.32), rgba(14,116,144,0.18));
    box-shadow: 0 0 14px rgba(56,189,248,0.3);
  }
  .tile-icon svg{ width:18px; height:18px; stroke-width:2; fill:none; }
  .tile-icon.violet svg{ stroke:var(--accent-violet); }
  .tile-icon.sky svg{ stroke:var(--accent-sky); }

  .tile-body{ flex:1; min-width:0; }
  .tile-title{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size:14.5px;
    color:var(--text-primary);
    margin-bottom:2px;
  }
  .tile-sub{
    font-size:12.5px;
    color:var(--text-secondary);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tile-sub .dot{
    width:5px; height:5px; border-radius:50%;
    background:var(--text-tertiary);
    flex-shrink:0;
  }
  .tile-sub.mono{ font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:0.2px; }
  .status-idle{ color:var(--text-secondary); }
  .status-live{ color:var(--accent-emerald); }
  .status-live .dot{ background:var(--accent-emerald); box-shadow:0 0 6px var(--accent-emerald); }

  .chevron{ flex-shrink:0; opacity:0.4; }
  .chevron svg{ width:16px; height:16px; stroke:var(--text-secondary); stroke-width:2; fill:none; }

  .badge{
    font-family:'Manrope',sans-serif;
    font-size:11.5px;
    font-weight:700;
    color:var(--accent-violet);
    background: rgba(167,139,250,0.14);
    border:1px solid rgba(167,139,250,0.3);
    padding:5px 11px 5px 8px;
    border-radius:20px;
    display:flex; align-items:center; gap:5px;
    flex-shrink:0;
  }
  .badge svg{ width:12px; height:12px; stroke:var(--accent-violet); stroke-width:2.4; fill:none; }

  /* ---------- Quick actions dock ---------- */
  .dock-wrap{
    position:absolute;
    bottom:16px; left:16px; right:16px;
    z-index:3;
  }
  .dock{
    padding:14px 6px 12px;
    display:flex;
    justify-content:space-between;
    background: rgba(14,18,28,0.65);
    border:1px solid rgba(255,255,255,0.14);
    box-shadow:
      0 1px 1px rgba(255,255,255,0.1) inset,
      0 20px 40px -12px rgba(0,0,0,0.7);
  }
  .dock-item{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    width:60px;
    cursor:pointer;
  }
  .dock-icon{
    width:38px; height:38px;
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
  }
  .dock-icon svg{ width:18px; height:18px; stroke-width:2; fill:none; stroke:var(--text-secondary); }
  .dock-item.active .dock-icon{
    background: linear-gradient(155deg, rgba(167,139,250,0.28), rgba(124,110,240,0.14));
    box-shadow: 0 4px 14px var(--accent-violet-glow), 0 0 0 1px rgba(255,255,255,0.12) inset;
  }
  .dock-item.active .dock-icon svg{ stroke:#fff; }
  .dock-item.active .dock-label{ color:var(--text-primary); }
  .dock-label{ font-size:10.5px; color:var(--text-tertiary); font-weight:500; }
</style>
</head>
<body>

<div class="app-window">
  <div class="ambient"></div>

  <div class="titlebar">
    <div class="titlebar-left">
      <div class="titlebar-logo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z" stroke="white" stroke-width="2.2" stroke-linejoin="round"/></svg>
      </div>
      <span class="titlebar-title">Conduit</span>
    </div>
    <div class="titlebar-controls">
      <span><svg viewBox="0 0 12 12"><line x1="1" y1="6" x2="11" y2="6"/></svg></span>
      <span><svg viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1"/></svg></span>
      <span><svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg></span>
    </div>
  </div>

  <div class="content">
    <h1 class="page-title">Overview</h1>

    <div class="glass hero">
      <div class="hero-icon">
        <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div>
        <div class="hero-text-title">Sync is running</div>
        <div class="hero-text-sub">Connected to 0 of 1 paired device(s)</div>
      </div>
    </div>

    <div class="section-label">Folder pairs</div>
    <div class="tile-list">
      <div class="glass tile">
        <div class="tile-icon violet">
          <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">Aegis Sync</div>
          <div class="tile-sub status-idle"><span class="dot"></span>Two-way · Idle</div>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      </div>

      <div class="glass tile">
        <div class="tile-icon violet">
          <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">Expense Sync</div>
          <div class="tile-sub status-idle"><span class="dot"></span>Two-way · Idle</div>
        </div>
        <div class="chevron"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div>
      </div>
    </div>

    <div class="section-label">Devices on this network</div>
    <div class="tile-list">
      <div class="glass tile">
        <div class="tile-icon sky">
          <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        </div>
        <div class="tile-body">
          <div class="tile-title">Android Phone</div>
          <div class="tile-sub mono">3F02-8EB1 · 10.24.20.37</div>
        </div>
        <div class="badge">
          <svg viewBox="0 0 24 24"><path d="M12 2l7 4v6c0 5-3.5 8-7 10-3.5-2-7-5-7-10V6l7-4z"/></svg>
          Paired
        </div>
      </div>
    </div>
  </div>

  <div class="dock-wrap">
    <div class="glass dock">
      <div class="dock-item active">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg></div>
        <div class="dock-label">Home</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg></div>
        <div class="dock-label">Folders</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="14" height="10" rx="1"/><path d="M18 9l4-2v10l-4-2"/></svg></div>
        <div class="dock-label">Devices</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="2"/><rect x="9" y="1.5" width="6" height="3" rx="1"/></svg></div>
        <div class="dock-label">Clipboard</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><path d="M2 8.5a15 15 0 0120 0M5.5 12a10 10 0 0113 0M9 15.5a5 5 0 016 0"/><circle cx="12" cy="19" r="1"/></svg></div>
        <div class="dock-label">Remote</div>
      </div>
      <div class="dock-item">
        <div class="dock-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.6 1.6 0 00-1.8-.3 1.6 1.6 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.6 1.6 0 00-1-1.5 1.6 1.6 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.6 1.6 0 00.3-1.8 1.6 1.6 0 00-1.5-1H3a2 2 0 110-4h.1a1.6 1.6 0 001.5-1 1.6 1.6 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.6 1.6 0 001.8.3H9a1.6 1.6 0 001-1.5V3a2 2 0 114 0v.1a1.6 1.6 0 001 1.5 1.6 1.6 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.6 1.6 0 00-.3 1.8V9a1.6 1.6 0 001.5 1H21a2 2 0 110 4h-.1a1.6 1.6 0 00-1.5 1z"/></svg></div>
        <div class="dock-label">Settings</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
