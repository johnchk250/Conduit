org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Run Kotlin compilation in-process instead of via a separate daemon. The
# daemon can crash intermittently after JDK swaps; in-process is more robust
# for this project's size and avoids "Daemon compilation failed: null".
kotlin.compiler.execution.strategy=in-process
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
